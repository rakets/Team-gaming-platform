<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Session Dashboard</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">


    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>

    <header class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <span class="navbar-brand">Game Session : <label th:text="${roomName}"></label></span>
        <button class="btn btn-outline-light" onclick="window.location='/logout'">Logout</button>
    </header>

    <a class="" th:href="@{/dashboard/}" method="get">Back to Dashboard</a>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>

    <script type="text/javascript" th:inline="javascript">
    
        // Подключение при полной загрузке страницы
        $(document).ready(function () {
            if (!stompClient) { // проверка, чтобы избежать двойного подключения
                connect();
            }
        });
    </script>

</body>

</html>
