<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Game Dashboard</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}">
</head>

<body>

<header class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Game Rooms</span>
    <label th:text="${username}" class="navbar-brand"></label>
    <button class="btn btn-outline-light" onclick="window.location='/logout'">Logout</button>
</header>

<div class="container mt-4">

    <!-- Заголовок -->
    <h2 class="mb-3">Game Rooms Dashboard</h2>

    <!-- Поиск игровой комнаты -->
    <form th:action="@{/dashboard}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search for a game room..."
                   th:value="${search}">
            <button class="btn btn-primary" type="submit">
                <i class="fa fa-search"></i> Search
            </button>
        </div>
    </form>

    <!-- list of game rooms -->
    <div th:if="${rooms != null}">
        <div th:each="room : ${rooms}" class="card mb-2">
            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h5 th:text="${room.name}">Room Name</h5>
                    <p class="mb-0">
                        Players: <span th:text="${room.players}">0</span> /
                        <span th:text="${room.maxPlayers}">10</span>
                    </p>
                </div>

                <a th:href="@{/room/{id}(id=${room.id})}"
                   class="btn btn-success">
                    Join Room
                </a>

            </div>
        </div>
    </div>

    <div th:if="${rooms == null or #lists.isEmpty(rooms)}">
        <p class="text-muted">No rooms found.</p>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
